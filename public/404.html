<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>DG Portfolio</title>
    <script>
      // GitHub Pages SPA redirect fix
      // When a user navigates directly to a subpage (e.g. /Dg-s/projects),
      // GitHub Pages returns this 404.html. We convert the path to a query
      // string and redirect to index.html, which then restores the route.
      var l = window.location;
      l.replace(
        l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
        l.pathname.split('/').slice(0, 1 + 1).join('/') + '/?/' +
        l.pathname.slice(1).split('/').slice(1).join('/').replace(/&/g, '~and~') +
        (l.search ? '&' + l.search.slice(1).replace(/&/g, '~and~') : '') +
        l.hash
      );
    </script>
  </head>
  <body></body>
</html>
